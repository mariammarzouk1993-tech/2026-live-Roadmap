<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2026 UX Design Roadmap — Floward</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f5f8;color:#1e293b;font-size:13px}
:root{
  --navy:#1a1f4e;--indigo:#6366f1;--indigo-light:#818cf8;
  --green:#059669;--green-bg:#d1fae5;--green-border:#059669;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-border:#7c3aed;
  --orange:#f97316;--orange-bg:#ffedd5;--orange-border:#f97316;
  --gray:#94a3b8;--gray-bg:#e2e8f0;--gray-border:#94a3b8;
  --slate50:#f8fafc;--slate100:#f1f5f9;--slate200:#e2e8f0;
  --slate300:#cbd5e1;--slate400:#94a3b8;--slate500:#64748b;
  --slate600:#475569;--slate700:#334155;--slate800:#1e293b;--slate900:#0f172a;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-lg:0 10px 25px rgba(0,0,0,.12),0 4px 10px rgba(0,0,0,.08);
}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--slate300);border-radius:3px}

/* layout */
#app{min-height:100vh}

/* HEADER */
.hdr{background:white;border-bottom:1px solid var(--slate200);padding:20px 32px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr-inner{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--indigo);margin-bottom:4px}
.hdr-h1{font-size:22px;font-weight:800;color:var(--slate900);letter-spacing:-.01em}
.hdr-sub{font-size:12px;color:var(--slate400);margin-top:4px;max-width:460px}
.legend-strip{display:flex;flex-wrap:wrap;gap:16px;align-items:center}
.legend-item{display:flex;align-items:center;gap:7px;cursor:default}
.legend-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.legend-label{font-size:11px;font-weight:600;color:var(--slate700)}
.legend-count{font-size:10px;color:var(--slate400)}

/* TOOLBAR */
.toolbar{background:white;border-bottom:1px solid var(--slate200);padding:8px 32px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:var(--hdr-h,88px);z-index:40}
.tb-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--slate200);background:var(--slate50);color:var(--slate700);transition:all .15s;font-family:inherit}
.tb-btn:hover{background:var(--slate100);border-color:var(--slate300)}
.tb-btn.accent{background:var(--indigo);color:white;border-color:var(--indigo)}
.tb-btn.accent:hover{background:#4f46e5}
.tb-btn.success{background:#ecfdf5;color:var(--green);border-color:#a7f3d0}
.tb-btn.success:hover{background:#d1fae5}
.tb-sep{width:1px;height:22px;background:var(--slate200)}
.search-wrap{flex:1;max-width:260px;position:relative}
.search-wrap input{width:100%;padding:6px 12px 6px 30px;border:1px solid var(--slate200);border-radius:6px;font-size:12px;font-family:inherit;color:var(--slate700);background:var(--slate50);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--indigo);background:white}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--slate400);font-size:13px;pointer-events:none}

/* GRID — single overflow-x:auto scroll container.
   col-header is position:sticky inside it; `top` is set by JS
   to equal the measured height of the three sticky bars above. */
.grid-outer{background:white;box-shadow:var(--shadow)}
.grid-scroll{overflow-x:auto;overflow-y:visible}
.grid-wrap{background:white;box-shadow:var(--shadow);overflow-x:auto}/* legacy alias */

/* col-header top set dynamically via inline style */
.col-header{display:flex;position:sticky;z-index:20;background:white;border-bottom:1px solid var(--slate200);min-width:max-content}
.col-label-cell{flex-shrink:0;border-right:1px solid var(--slate200);padding:0 16px 8px;display:flex;align-items:flex-end}
.col-label-text{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--slate300)}
.month-grid{flex:1;min-width:0}
.quarter-row{display:flex;border-bottom:1px solid var(--slate100)}
.quarter-cell{flex:1;text-align:center;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 0}
.month-row{display:flex}
.month-cell{flex:1;text-align:center;font-size:11px;color:var(--slate400);padding:5px 0;border-right:1px solid var(--slate100)}
.month-cell:last-child{border-right:none}

/* THEME ROWS */
.rows-container{min-width:max-content}
.theme-row{display:flex;border-bottom:1px solid var(--slate100);min-width:max-content}
.theme-row:last-child{border-bottom:none}
.theme-row:hover{background:rgba(248,250,252,.4)}
.theme-label-cell{flex-shrink:0;display:flex;align-items:center;padding:0 16px;border-right:1px solid var(--slate100);gap:0}
.theme-label-inner{display:flex;align-items:center;gap:10px;width:100%}
.theme-icon-box{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.theme-name{font-size:12px;font-weight:700;color:var(--slate700);flex:1;cursor:pointer}
.theme-name:hover{color:var(--indigo)}
.theme-edit-btn{opacity:0;width:20px;height:20px;border-radius:4px;border:1px solid var(--slate200);background:white;color:var(--slate500);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0}
.theme-label-cell:hover .theme-edit-btn{opacity:1}
.bars-area{flex:1;min-width:0;position:relative}

/* BARS */
.bar{position:absolute;border-radius:6px;display:flex;flex-direction:column;justify-content:center;padding:0 10px;cursor:pointer;transition:filter .12s,transform .1s;overflow:hidden}
.bar:hover{filter:brightness(.95);transform:translateY(-1px);z-index:5}
.bar-title{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.bar-date{font-size:9px;font-weight:500;opacity:.8;line-height:1.2}
.bar-dashed{border-style:dashed!important;background-image:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(5,150,105,.08) 4px,rgba(5,150,105,.08) 8px)!important}
.bar-actions{position:absolute;right:5px;top:50%;transform:translateY(-50%);display:none;gap:3px}
.bar:hover .bar-actions{display:flex}
.bar-action{width:18px;height:18px;border-radius:3px;border:none;background:rgba(255,255,255,.85);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.bar-action:hover{background:white}
.add-item-btn{position:absolute;left:50%;transform:translateX(-50%);display:none;padding:2px 8px;background:var(--indigo);color:white;border:none;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;z-index:3}
.bars-area:hover .add-item-btn{display:block}

/* FOOTER STRIP */
.footer-qstrip{display:flex;border-top:1px solid var(--slate100);background:#fafbfc}
.footer-label-pad{flex-shrink:0;padding:10px 16px}
.footer-q-cells{flex:1;display:flex}
.footer-q-cell{flex:1;text-align:center;font-size:10px;font-weight:600;padding:10px 0;color:var(--slate400)}

/* BOTTOM PANELS */
.bottom-panels{display:grid;grid-template-columns:repeat(3,1fr);border-top:2px solid var(--slate200);background:white;box-shadow:var(--shadow)}
@media(max-width:900px){.bottom-panels{grid-template-columns:1fr}}
.panel{padding:24px;border-right:1px solid var(--slate100)}
.panel:last-child{border-right:none}
.panel-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.panel-icon-box{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.panel-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--slate700)}
.insight-item{display:flex;gap:10px;margin-bottom:12px}
.insight-dot{width:6px;height:6px;border-radius:50%;background:var(--indigo-light);margin-top:5px;flex-shrink:0}
.insight-label{font-size:11px;font-weight:600;color:var(--slate700)}
.insight-detail{font-size:11px;color:var(--slate400);line-height:1.5;margin-top:2px}
.split-bar{display:flex;border-radius:4px;overflow:hidden;height:20px;margin-top:12px;font-size:9px;font-weight:700}
.split-bar div{display:flex;align-items:center;justify-content:center}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:var(--slate50);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px}
.kpi-icon-box{width:32px;height:32px;border-radius:8px;background:white;box-shadow:0 1px 3px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.kpi-val{font-size:17px;font-weight:800;color:var(--slate900);line-height:1}
.kpi-lbl{font-size:10px;color:var(--slate400);margin-top:2px;line-height:1.3}
.tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--slate100);color:var(--slate600);border:1px solid var(--slate200);display:inline-block;margin:2px}

/* FIXED LEGEND BOX */
.legend-box{position:fixed;bottom:20px;left:24px;background:white;border-radius:12px;box-shadow:var(--shadow-lg);border:1px solid var(--slate200);padding:14px 16px;z-index:40}
.legend-box-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--slate300);margin-bottom:8px}
.legend-box-item{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.legend-box-item:last-child{margin-bottom:0}
.legend-swatch{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px}

/* TOOLTIP */
.tooltip{position:fixed;z-index:100;background:white;border-radius:12px;box-shadow:var(--shadow-lg);border:1px solid var(--slate200);padding:16px;width:300px;pointer-events:none}
.tooltip-title{font-size:13px;font-weight:700;color:var(--slate900);margin-bottom:8px;line-height:1.35}
.tooltip-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-bottom:6px}
.tooltip-sub{font-size:11px;font-weight:500;color:var(--slate500);margin-bottom:8px}
.tooltip-desc{font-size:11px;color:var(--slate600);line-height:1.6;border-top:1px solid var(--slate100);padding-top:8px;margin-top:4px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:16px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--slate100);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:16px;font-weight:700;color:var(--slate900)}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--slate200);background:var(--slate50);color:var(--slate600);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--slate400);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--slate200);border-radius:8px;font-size:13px;font-family:inherit;color:var(--slate800);outline:none;transition:border-color .15s;background:white}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--indigo)}
.form-group textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--slate100);display:flex;gap:8px;justify-content:flex-end}
.m-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.m-btn.cancel{background:var(--slate100);color:var(--slate700)}
.m-btn.cancel:hover{background:var(--slate200)}
.m-btn.save{background:var(--indigo);color:white}
.m-btn.save:hover{background:#4f46e5}
.m-btn.danger{background:#fef2f2;color:#ef4444;border:1px solid #fecaca}
.m-btn.danger:hover{background:#fee2e2}

/* FILTER TAGS */
.filter-tags{padding:8px 32px;background:var(--slate50);border-bottom:1px solid var(--slate200);display:flex;gap:6px;flex-wrap:wrap;align-items:center;position:sticky;top:var(--hdr-toolbar-h,130px);z-index:39}
.filter-tag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.filter-tag.active{background:var(--indigo);color:white;border-color:var(--indigo)}
.filter-tag:not(.active){background:white;color:var(--slate600);border-color:var(--slate200)}
.filter-tag:not(.active):hover{border-color:var(--indigo);color:var(--indigo)}
.filter-sep{font-size:10px;color:var(--slate300);padding:0 2px}

@media print{
  .toolbar,.filter-tags,.legend-box,.hdr .legend-strip,.theme-edit-btn,.bar-actions,.add-item-btn,.tb-btn{display:none!important}
  .hdr{position:relative!important;top:auto!important}
  .col-header{position:relative!important;top:auto!important}
  body{background:white}
}
</style>
</head>

}

}

      { id:"w2", name:"Daily Cycle Count — WMS Web & Mobile", start:1, end:1, status:"completed", sub:"Feb 12 – 19 · Design Handoff", desc:"Full daily cycle count module for WMS — web and mobile interfaces. Covers count workflow, discrepancy flagging, and supervisor review." },
      { id:"w3", name:"Dynamic Inventory Transaction Reason Management", start:6, end:7, status:"in-review", sub:"Q3 · Jul – Aug · Spillover from Q2 · PRD", desc:"Enables warehouse managers to dynamically configure and manage transaction reason codes across inventory movements." },

  {

/* ── LANE PACKING ──────────────────────────────────────────────── */
function packLanes(items) {
  const laneEnd = [];
  return items.map(p => {
    const effectiveEnd = p.ongoingEnd ?? p.end;
    let l = 0;
    while (laneEnd[l] !== undefined && laneEnd[l] >= p.start) l++;
    laneEnd[l] = effectiveEnd;
    return { ...p, lane: l };
  });
}

  useEffect(() => {
    function measure() {
      const h1 = hdrRef.current?.offsetHeight     || 0;
      const h2 = toolbarRef.current?.offsetHeight || 0;
      const h3 = filterRef.current?.offsetHeight  || 0;
      // Update CSS custom properties so .toolbar and .filter-tags get correct sticky tops
      document.documentElement.style.setProperty('--hdr-h',          `${h1}px`);
      document.documentElement.style.setProperty('--hdr-toolbar-h',  `${h1 + h2}px`);
      setColHeaderTop(h1 + h2 + h3);
    }
    // Small delay so refs are measured after first paint
    const t = setTimeout(measure, 0);
    window.addEventListener('resize', measure);
    return () => { clearTimeout(t); window.removeEventListener('resize', measure); };
  }, []);

  /* derived counts */
  const allItems = useMemo(() => themes.flatMap(t => t.items), [themes]);
  const countBy = s => allItems.filter(i => i.status === s).length;

    return themes.map(t => ({
      ...t,

        const matchSearch = !search || it.name.toLowerCase().includes(search.toLowerCase());

/*  ITEM MODAL                                                      */
/* ─────────────────────────────────────────────────────────────── */
function ItemModal({ themes, themeId, item, onSave, onDelete, onClose }) {
  const isNew = !item;
  const [form, setForm] = useState({
    id:     item?.id || genId(),
    name:   item?.name || '',
    start:  item?.start ?? 0,
    end:    item?.end ?? 0,
    ongoingEnd: item?.ongoingEnd ?? '',
    ongoingLabel: item?.ongoingLabel || '',
    status: item?.status || 'completed',
    sub:    item?.sub || '',
    desc:   item?.desc || '',
    themeId: themeId,
  });

  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const handleSave = () => {
    if (!form.name.trim()) { alert('Please enter an item name.'); return; }
    const clean = {
      id: form.id,
      name: form.name.trim(),
      start: +form.start,
      end: +form.end,
      status: form.status,
      sub: form.sub.trim(),
      desc: form.desc.trim(),
    };
    if (form.ongoingEnd !== '') clean.ongoingEnd = +form.ongoingEnd;
    if (form.ongoingLabel) clean.ongoingLabel = form.ongoingLabel.trim();
    onSave(form.themeId, clean, item ? themeId : null);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-hdr">
          <h3>{isNew ? '＋ Add Roadmap Item' : '✏️ Edit Roadmap Item'}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label>Item Name *</label>
            <input value={form.name} onChange={e => set('name',e.target.value)} placeholder="e.g. New Feature Design"/>
          </div>
          <div className="form-group">
            <label>Theme</label>
            <select value={form.themeId} onChange={e => set('themeId',e.target.value)}>
              {themes.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>Status</label>
            <select value={form.status} onChange={e => set('status',e.target.value)}>
              {Object.entries(STATUSES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div className="form-row">
            <div className="form-group" style={{marginBottom:0}}>
              <label>Start Month</label>
              <select value={form.start} onChange={e => set('start',e.target.value)}>
                {MONTHS.map((m,i) => <option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label>End Month</label>
              <select value={form.end} onChange={e => set('end',e.target.value)}>
                {MONTHS.map((m,i) => <option key={i} value={i}>{m}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:14,marginTop:14}}>
            <div className="form-group">
              <label>Ongoing Extension End (optional)</label>
              <select value={form.ongoingEnd} onChange={e => set('ongoingEnd',e.target.value)}>
                <option value="">— None —</option>
                {MONTHS.map((m,i) => <option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            {form.ongoingEnd !== '' && (
              <div className="form-group">
                <label>Ongoing Extension Label</label>
                <textarea value={form.ongoingLabel} onChange={e => set('ongoingLabel',e.target.value)} placeholder="Describe what continues in the dashed extension…"/>
              </div>
            )}
          </div>
          <div className="form-group">
            <label>Sub-label / Duration note</label>
            <input value={form.sub} onChange={e => set('sub',e.target.value)} placeholder="e.g. Mar 2 – Apr 16 · Design Handoff"/>
          </div>
          <div className="form-group">
            <label>Description (shown in tooltip)</label>
            <textarea value={form.desc} onChange={e => set('desc',e.target.value)} placeholder="Describe what this initiative covers…"/>
          </div>
        </div>
        <div className="modal-footer">
          {!isNew && <button className="m-btn danger" onClick={() => { if(confirm('Delete this item?')) onDelete(themeId, item.id); }}>Delete</button>}
          <button className="m-btn cancel" onClick={onClose}>Cancel</button>
          <button className="m-btn save" onClick={handleSave}>{isNew ? 'Add Item' : 'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────── */
/*  THEME MODAL                                                     */
/* ─────────────────────────────────────────────────────────────── */
function ThemeModal({ theme, onSave, onDelete, onClose }) {
  const isNew = !theme;
  const [name, setName] = useState(theme?.name || '');

  const handleSave = () => {
    if (!name.trim()) { alert('Please enter a theme name.'); return; }
    onSave({ id: theme?.id || genId(), name: name.trim(), items: theme?.items || [] });
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{width:380}}>
        <div className="modal-hdr">
          <h3>{isNew ? '＋ Add Theme' : '✏️ Edit Theme'}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label>Theme Name *</label>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Mobile Experience"/>
          </div>
          <p style={{fontSize:11,color:'#94a3b8',lineHeight:1.5}}>
            Icons and colors are automatically assigned based on the theme name. You can customize them further by editing the source data.
          </p>
        </div>
        <div className="modal-footer">
          {!isNew && <button className="m-btn danger" onClick={() => onDelete(theme.id)}>Delete Theme</button>}
          <button className="m-btn cancel" onClick={onClose}>Cancel</button>
          <button className="m-btn save" onClick={handleSave}>{isNew ? 'Add Theme' : 'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('app'));
</script>
</body>
</html>
